name: Voice Sample (manual audition)

# Kept tool — dispatch manually to audition voice changes. Renders a Christie/Isla
# ElevenLabs clip with the CURRENT +3dB Christie boost + voice_settings, and uploads
# it as an artifact (download with: gh run download <id> -n voice-sample).
on:
  workflow_dispatch:

jobs:
  sample:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          sudo apt-get install -y ffmpeg
          pip install google-cloud-texttospeech

      - name: Synthesize sample (forces ElevenLabs path)
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          cd tokyoclose/src
          python - <<'PY'
          import tts
          script = """[ALEX] Good morning, Tokyo. If you just woke up, sit down for this one.
          [MAYA] Big news, Alex. The Nikkei 225 closed at a record high, up four point six one percent.
          [ALEX] That's a gain of more than three thousand points in a single session. A stampede, not a drift.
          [MAYA] And the spark came from overnight America. Micron blew the doors off with earnings.
          [ALEX] Management talked up AI memory demand like there's no ceiling. The whole chip complex lit up.
          [MAYA] Tokyo Electron, Advantest, Kioxia, all flying. Risk on, full throttle.
          [ALEX] So enjoy the party, but know where the exits are. The yen is near a thirty-nine year low.
          [MAYA] Noted. Let's get into the names that actually moved, and what to watch at the open."""
          tts._synthesize_elevenlabs(script, "/tmp/sample.mp3")
          print("done")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: voice-sample
          path: /tmp/sample.mp3
