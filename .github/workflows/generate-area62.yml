name: Generate Area 62

on:
  # Triggered by the jpx-trigger container on the NAS at 16:30 JST (evening edition).
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: area62/src/requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Python deps
        run: pip install -r area62/src/requirements.txt

      - name: Install Playwright
        run: playwright install chromium --with-deps

      - name: Generate headlines
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_PUSH_TOKEN:     ${{ secrets.GH_PUSH_TOKEN }}
          NIKKEI_STATE:      ${{ secrets.NIKKEI_STATE }}
        run: python area62/src/main.py
