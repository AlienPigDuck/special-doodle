name: Generate Tokyo Close

on:
  # Triggered by the jpx-trigger container on the NAS at 16:15 JST (after the
  # post-close market wrap is published). GitHub's own cron was unreliable, so
  # schedule: is intentionally removed.
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r tokyoclose/requirements.txt

      - name: Install Playwright
        run: pip install playwright && playwright install chromium --with-deps

      - name: Write GCP credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/gcp-key.json

      - name: Generate podcast
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
          GH_PUSH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
          NIKKEI_STATE: ${{ secrets.NIKKEI_STATE }}
          NIKKEI_USER: ${{ secrets.NIKKEI_USER }}
          NIKKEI_PASS: ${{ secrets.NIKKEI_PASS }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          OUTPUT_DIR: /tmp/podcast
        run: |
          mkdir -p /tmp/podcast
          cd tokyoclose/src
          python main.py
