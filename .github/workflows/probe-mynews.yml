name: Probe Nikkei MyNews

# Throwaway exploration of https://www.nikkei.com/mynews — delete after use.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Probe /mynews
        env:
          NIKKEI_STATE: ${{ secrets.NIKKEI_STATE }}
        run: python tokyoclose/src/probe_mynews.py
