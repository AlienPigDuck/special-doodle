<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Area 62</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080808;--border:#1a1a1a;
      --accent:#f59e0b;--accent-dim:rgba(245,158,11,.1);
      --text:#ffffff;--mono:'Anonymous Pro',monospace;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh}
    #main{max-width:820px;margin:0 auto;padding:40px 24px}
    .header{border-bottom:1px solid var(--border);padding-bottom:24px;margin-bottom:32px}
    .badge{font-size:11px;letter-spacing:3px;text-transform:uppercase;
      color:var(--accent);background:var(--accent-dim);border:1px solid rgba(245,158,11,.25);
      padding:3px 10px;border-radius:2px;display:inline-block;margin-bottom:14px}
    h1{font-size:38px;font-weight:700;letter-spacing:6px;text-transform:uppercase;
      color:var(--text);margin-bottom:6px}
    .tagline{font-size:15px;letter-spacing:2px;text-transform:uppercase;color:#888}
    .meta{margin-top:16px;font-size:15px;color:var(--text);letter-spacing:1px}
    .meta span{color:var(--accent)}
    .meta-count{margin-top:4px;font-size:14px;color:var(--text)}
    .section{margin-bottom:32px}
    .section-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .section-name{font-size:13px;font-weight:700;letter-spacing:3px;
      text-transform:uppercase;color:var(--accent)}
    .section-line{flex:1;height:1px;background:var(--border)}
    .section-count{font-size:13px;color:var(--text);letter-spacing:1px;flex-shrink:0}
    .article{display:flex;gap:14px;padding:8px 0;border-bottom:1px solid var(--border)}
    .article:last-child{border-bottom:none}
    .article-body{display:flex;flex-direction:column;gap:4px}
    .article-link{font-size:16px;color:#ffffff;text-decoration:none;
      letter-spacing:.3px;line-height:1.6;transition:opacity .1s}
    .article-link:visited{color:#ffffff}
    .article-link:hover{opacity:.75}
    .article-url{font-size:12px;color:#60a5fa;text-decoration:none;letter-spacing:.3px;word-break:break-all}
    .article-url:visited{color:#60a5fa}
    .article-url:hover{color:#93c5fd}
    .state-msg{font-size:16px;color:var(--text);letter-spacing:1px;
      padding:60px 0;text-align:center}
    .footer{margin-top:48px;padding-top:16px;border-top:1px solid var(--border);
      font-size:14px;color:#555;letter-spacing:1px;display:flex;gap:24px;flex-wrap:wrap}
    .footer a{color:#60a5fa;text-decoration:none}
    .footer a:hover{color:#93c5fd}
  </style>
</head>
<body>
  <div id="main">
    <div class="header">
      <div class="badge">Evening Headlines</div>
      <h1>Area 62</h1>
      <div class="tagline">Japan&rsquo;s Leading Financial Newspaper &mdash; Evening Edition, English Headlines</div>
      <div class="meta" id="meta-date" style="display:none">
        <span id="date-str"></span> &bull; Generated <span id="gen-time"></span>
      </div>
      <div class="meta-count" id="meta-count"></div>
    </div>

    <div id="content">
      <div class="state-msg">Loading&hellip;</div>
    </div>

    <div class="footer">
      <a href="/to/">Tokyo Open</a>
      <a href="/tps/">The Papers Say</a>
      <span style="color:#555">AI-generated. May contain errors.</span>
    </div>
  </div>

  <script>
    function loadHeadlines() {
      fetch('headlines.json?_=' + Date.now())
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(data => renderHeadlines(data))
        .catch(() => {
          document.getElementById('content').innerHTML =
            '<div class="state-msg">No headlines available yet &mdash; check back after 16:30 JST.</div>';
        });
    }

    function renderHeadlines(data) {
      if (!data.total) {
        document.getElementById('content').innerHTML =
          '<div class="state-msg">No headlines available yet &mdash; check back after 16:30 JST.</div>';
        return;
      }
      document.getElementById('meta-date').style.display = '';
      document.getElementById('date-str').textContent = data.date;
      document.getElementById('gen-time').textContent = data.generated_at_jst;
      document.getElementById('meta-count').textContent =
        data.total + ' headlines across ' + data.sections.length + ' sections';

      const out = [];
      data.sections.forEach(sec => {
        out.push(`<div class="section"><div class="section-header">
          <div class="section-name">${esc(sec.name)}</div>
          <div class="section-line"></div>
          <div class="section-count">${sec.articles.length}</div>
        </div>`);
        sec.articles.forEach(a => {
          out.push(`<div class="article">
            <div class="article-body">
              <a class="article-link" href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.title)}</a>
              <a class="article-url" href="${esc(a.url)}" target="_blank" rel="noopener">(${esc(a.url)})</a>
            </div>
          </div>`);
        });
        out.push('</div>');
      });
      document.getElementById('content').innerHTML = out.join('');
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    loadHeadlines();
  </script>
</body>
</html>
